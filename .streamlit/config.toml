[theme]
base = "dark"
primaryColor = "#f97316"          # orange-500 — accent for active filters / CTAs
backgroundColor = "#0a0a0a"       # near-black
secondaryBackgroundColor = "#171717"
textColor = "#f5f5f5"
font = "sans serif"

[server]
headless = true
runOnSave = true
fileWatcherType = "auto"

[browser]
gatherUsageStats = false
